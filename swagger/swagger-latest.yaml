openapi: 3.0.3
info:
  title: Mzad Cars Backend API
  version: 2.0.0
  description: |
    API contract for listings, valuation, alerts, notifications, push/WhatsApp channels,
    authentication, user/profile management, and listing CRUD.
servers:
  - url: http://localhost:8090/api
    description: Local development
  - url: http://192.168.1.149:8090/api
    description: LAN backend
tags:
  - name: Auth
  - name: Users
  - name: Profile
  - name: Listings
  - name: Insights
  - name: Alerts
  - name: Notifications
  - name: Channels
  - name: Push
  - name: Collector
  - name: MLValuation
  - name: InstantOffers
security:
  - bearerAuth: []
  - guestToken: []
paths:
  /auth/guest/login:
    post:
      tags: [Auth]
      summary: Issue guest token
      security: []
      responses:
        "200":
          description: Guest token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a user account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email/phone and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: Refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
  /auth/change-password:
    post:
      tags: [Auth]
      summary: Change password for current authenticated user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [old_password, new_password]
              properties:
                old_password: { type: string }
                new_password: { type: string, minLength: 8 }
      responses:
        "200":
          description: Password changed and new tokens issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
  /auth/request-reset:
    post:
      tags: [Auth]
      summary: "Request password reset token (dev: token returned in response)"
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login]
              properties:
                login: { type: string, description: email or phone }
      responses:
        "200":
          description: Reset token issued if account exists
  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password with reset token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reset_token, new_password]
              properties:
                reset_token: { type: string }
                new_password: { type: string, minLength: 8 }
      responses:
        "200":
          description: Password reset and tokens issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
  /auth/admin-bootstrap:
    post:
      tags: [Auth]
      summary: Create first admin account (only when no admin exists)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Admin created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke current session/token
      responses:
        "200":
          description: Logged out
  /users:
    get:
      tags: [Users]
      summary: List users (admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: object
                properties:
                  rows:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
  /users/{user_id}:
    get:
      tags: [Users]
      summary: Get user by ID (admin)
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    put:
      tags: [Users]
      summary: Replace user role and status (admin)
      description: Fully replaces role and is_active. Both fields are required.
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role, is_active]
              properties:
                role:
                  type: string
                  enum: [guest, user, dealer, admin]
                is_active:
                  type: boolean
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      tags: [Users]
      summary: Update user role/status (admin)
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum: [guest, user, dealer, admin]
                is_active:
                  type: boolean
      responses:
        "200":
          description: User updated
    delete:
      tags: [Users]
      summary: Delete/deactivate user (admin)
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "204":
          description: User deleted
  /me:
    get:
      tags: [Profile]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /me/profile:
    get:
      tags: [Profile]
      summary: Get profile
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
    put:
      tags: [Profile]
      summary: Replace profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
    patch:
      tags: [Profile]
      summary: Patch profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated
  /listings:
    get:
      tags: [Listings]
      summary: Search and filter listings
      parameters:
        - in: query
          name: source
          schema:
            type: string
            enum: [all, mzad, qatarliving]
          description: Filter by marketplace source
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: make
          schema: { type: string }
        - in: query
          name: class_name
          schema: { type: string }
        - in: query
          name: model
          schema: { type: string }
        - in: query
          name: city
          schema: { type: string }
        - in: query
          name: sort
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 1000, default: 100 }
        - in: query
          name: deals_only
          schema: { type: string, enum: ["0", "1"], default: "0" }
        - in: query
          name: min_year
          schema: { type: integer }
        - in: query
          name: max_year
          schema: { type: integer }
        - in: query
          name: min_price
          schema: { type: number }
        - in: query
          name: max_price
          schema: { type: number }
        - in: query
          name: min_km
          schema: { type: number }
        - in: query
          name: max_km
          schema: { type: number }
        - in: query
          name: min_discount_pct
          schema: { type: number }
        - in: query
          name: max_discount_pct
          schema: { type: number }
        - in: query
          name: min_peer_count
          schema: { type: integer }
        - in: query
          name: max_peer_count
          schema: { type: integer }
        - in: query
          name: include_unapproved
          schema: { type: string, enum: ["0", "1"], default: "0" }
          description: Admin only. Include listings with is_approved=false.
        - in: query
          name: include_views
          schema: { type: string, enum: ["0", "1"], default: "0" }
          description: Include per-listing view_count when set to 1.
        - in: query
          name: is_approved
          schema: { type: string, enum: ["0", "1", "any"], default: "1" }
          description: |
            Approval filter.
            `1` = approved only (public default),
            `0` = unapproved only (admin),
            `any` = all listings regardless of approval (admin).
      responses:
        "200":
          description: Listing search result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingsResponse"
    post:
      tags: [Listings]
      summary: Create listing
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListingCreate"
      responses:
        "201":
          description: Listing created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
  /listings/{product_id}:
    get:
      tags: [Listings]
      summary: Get listing by ID
      parameters:
        - $ref: "#/components/parameters/ProductId"
        - in: query
          name: include_unapproved
          schema: { type: string, enum: ["0", "1"], default: "0" }
          description: Admin only. Include listing even when is_approved=false.
      responses:
        "200":
          description: Listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
    put:
      tags: [Listings]
      summary: Replace listing
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProductId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListingCreate"
      responses:
        "200":
          description: Listing updated
    patch:
      tags: [Listings]
      summary: Patch listing
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProductId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListingUpdate"
      responses:
        "200":
          description: Listing updated
    delete:
      tags: [Listings]
      summary: Delete listing
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "204":
          description: Listing removed
  /listings/{product_id}/peers:
    get:
      tags: [Listings]
      summary: Get peer listings and expected price baseline
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "200":
          description: Peer analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingPeersResponse"
  /listings/{product_id}/view:
    post:
      tags: [Listings]
      summary: Track listing view (public telemetry)
      security: []
      parameters:
        - $ref: "#/components/parameters/ProductId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                user_key: { type: string }
      responses:
        "200":
          description: View tracked
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
  /listings/{product_id}/price-history:
    get:
      tags: [Listings]
      summary: Internal listing price history with daily deal snapshot
      description: Internal endpoint (not part of external contract).
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "200":
          description: Price history
          content:
            application/json:
              schema:
                type: object
                properties:
                  rows:
                    type: array
                    items:
                      type: object
                      properties:
                        price_qar: { type: number }
                        recorded_at: { type: string, format: date-time }
                        deal_score: { type: number, nullable: true }
                        discount_pct: { type: number, nullable: true }
  /uploads:
    post:
      tags: [Listings]
      summary: Upload a file blob (base64)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filename, content_base64]
              properties:
                filename: { type: string }
                mime_type: { type: string }
                content_base64: { type: string }
      responses:
        "201":
          description: Uploaded
  /favorites:
    get:
      tags: [Listings]
      summary: Get favorites for current actor (token) or user_key
      parameters:
        - in: query
          name: user_key
          schema: { type: string }
      responses:
        "200":
          description: Favorite rows
    post:
      tags: [Listings]
      summary: Add listing to favorites
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [product_id]
              properties:
                product_id: { type: string }
                user_key: { type: string }
      responses:
        "201":
          description: Favorite created
  /favorites/{id}:
    delete:
      tags: [Listings]
      summary: Remove favorite by id
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: query
          name: user_key
          schema: { type: string }
      responses:
        "204":
          description: Favorite removed
  /summary:
    get:
      tags: [Insights]
      summary: Dashboard summary
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalListings: { type: integer }
                  topMakes:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        count: { type: integer }
                  phoneStats:
                    type: object
                    properties:
                      listingsWithPhone: { type: integer }
                      uniquePhoneNumbers: { type: integer }
                      coveragePct: { type: number, format: float }
                  approvalStats:
                    type: object
                    properties:
                      approved: { type: integer }
                      pending: { type: integer }
                  sourceStats:
                    type: array
                    items:
                      type: object
                      properties:
                        source: { type: string, enum: [mzad, qatarliving] }
                        listings: { type: integer }
                        listingsWithPhone: { type: integer }
                        uniquePhoneNumbers: { type: integer }
                  collectionRunStats:
                    type: object
                    properties:
                      totalRuns: { type: integer }
                      totalNewRows: { type: integer }
                      totalPagesScanned: { type: integer }
                      lastFinishedAt: { type: string, nullable: true }
                      avgNewRowsPerRun: { type: number, format: float }
                  collectionRuns:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        startedAt: { type: string, nullable: true }
                        finishedAt: { type: string, nullable: true }
                        durationSeconds: { type: integer, nullable: true }
                        pagesScanned: { type: integer }
                        newRows: { type: integer }
                        notes: { type: string }
                  freshStock:
                    type: array
                    items:
                      type: object
                      properties:
                        make: { type: string }
                        count: { type: integer }
                  dealDistribution:
                    type: object
                    properties:
                      hot_count: { type: integer }
                      good_count: { type: integer }
                      fair_count: { type: integer }
                      overpriced_count: { type: integer }
                      unscored_count: { type: integer }
                  avgPriceByMake:
                    type: array
                    items:
                      type: object
                      properties:
                        make: { type: string }
                        avg_price: { type: integer }
                        listing_count: { type: integer }
  /spotted:
    get:
      tags: [Insights]
      summary: Top spotted listings cache with scoring reasons
      responses:
        "200":
          description: Spotted listings
          content:
            application/json:
              schema:
                type: object
                properties:
                  rows:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/Listing"
                        - type: object
                          properties:
                            score: { type: integer }
                            spot_reasons: { type: string, description: JSON array string of badge reasons }
  /ranges:
    get:
      tags: [Insights]
      summary: Filter ranges
      responses:
        "200":
          description: Ranges for UI sliders
  /img-proxy:
    get:
      tags: [Insights]
      summary: Proxy remote listing images from approved hosts
      parameters:
        - in: query
          name: url
          required: true
          schema: { type: string }
          description: Remote image URL (allowed hosts only)
      responses:
        "200":
          description: Image bytes
        "403":
          description: Origin not allowed
        "502":
          description: Proxy error
  /value-estimate:
    get:
      tags: [Insights]
      summary: Estimate low/fair/high value from comparable cars
      parameters:
        - in: query
          name: make
          required: true
          schema: { type: string }
        - in: query
          name: class_name
          required: true
          schema: { type: string }
        - in: query
          name: model
          schema: { type: string }
        - in: query
          name: year
          required: true
          schema: { type: integer }
        - in: query
          name: km
          required: true
          schema: { type: number }
      responses:
        "200":
          description: Value band
  /alerts:
    get:
      tags: [Alerts]
      summary: Get saved alerts for user key
      parameters:
        - in: query
          name: user_key
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Alert list
    post:
      tags: [Alerts]
      summary: Create alert from selected filters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertCreate"
      responses:
        "200":
          description: Created
  /alerts/active:
    post:
      tags: [Alerts]
      summary: Enable/disable alert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [alert_id, active]
              properties:
                alert_id: { type: integer }
                active: { type: boolean }
      responses:
        "200":
          description: Updated
  /notifications:
    get:
      tags: [Notifications]
      summary: Get notifications
      parameters:
        - in: query
          name: user_key
          required: true
          schema: { type: string }
        - in: query
          name: unread_only
          schema: { type: string, enum: ["0", "1"], default: "0" }
        - in: query
          name: limit
          schema: { type: integer, default: 50, minimum: 1, maximum: 200 }
      responses:
        "200":
          description: Notification list
  /notifications/mark-read:
    post:
      tags: [Notifications]
      summary: Mark notifications as read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_key: { type: string }
                ids:
                  type: array
                  items: { type: integer }
      responses:
        "200":
          description: Updated
  /channels:
    get:
      tags: [Channels]
      summary: Get channel config (WhatsApp) for user
      parameters:
        - in: query
          name: user_key
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Channel status
    post:
      tags: [Channels]
      summary: Upsert channel config (WhatsApp)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_key]
              properties:
                user_key: { type: string }
                whatsapp_number: { type: string, example: "+97455551234" }
                whatsapp_enabled: { type: boolean }
      responses:
        "200":
          description: Saved
  /channels/test-whatsapp:
    post:
      tags: [Channels]
      summary: Send WhatsApp test message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_key]
              properties:
                user_key: { type: string }
      responses:
        "200":
          description: Test result
  /push/public-key:
    get:
      tags: [Push]
      summary: Get VAPID public key/config status
      responses:
        "200":
          description: Push config
  /push/status:
    get:
      tags: [Push]
      summary: Get push subscription status for user
      parameters:
        - in: query
          name: user_key
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Push status
  /push/subscribe:
    post:
      tags: [Push]
      summary: Upsert push subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_key, subscription]
              properties:
                user_key: { type: string }
                subscription:
                  type: object
                  properties:
                    endpoint: { type: string }
                    keys:
                      type: object
                      properties:
                        p256dh: { type: string }
                        auth: { type: string }
      responses:
        "200":
          description: Subscribed
  /push/unsubscribe:
    post:
      tags: [Push]
      summary: Disable push subscription(s)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_key: { type: string }
                endpoint: { type: string }
      responses:
        "200":
          description: Unsubscribed
  /push/test:
    post:
      tags: [Push]
      summary: Send push test message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_key]
              properties:
                user_key: { type: string }
      responses:
        "200":
          description: Test result
  /collector/run:
    post:
      tags: [Collector]
      summary: Trigger incremental collector run
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Trigger result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  new_rows: { type: integer }
                  deals:
                    type: object
                    properties:
                      ok: { type: boolean }
                      updated_rows: { type: integer }
                      computed_at: { type: string, format: date-time }
                  price_history_rows: { type: integer }
  /deals/recompute:
    post:
      tags: [Collector]
      summary: Recompute and persist per-car deal metrics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Recompute result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  updated_rows: { type: integer }
                  computed_at: { type: string, format: date-time }
  /admin/listings/{product_id}/approval:
    post:
      tags: [Listings]
      summary: Admin flip listing approval flag
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProductId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [is_approved]
              properties:
                is_approved: { type: boolean }
      responses:
        "200":
          description: Approval updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  listing:
                    $ref: "#/components/schemas/Listing"
  /ml/estimate:
    get:
      tags: [MLValuation]
      summary: ML-powered car price estimate (model v5)
      description: >
        Returns a price estimate using a segmented GradientBoosting model
        (budget ≤120k QAR / premium >120k QAR). Supply as many features as
        known — the model handles missing values internally. Including `trim`
        significantly improves accuracy for trims with large price spreads
        (e.g. GXR vs VXR on Land Cruiser, SE vs Platinum on Patrol).
      parameters:
        - in: query
          name: make
          schema: { type: string }
          example: Toyota
        - in: query
          name: class_name
          schema: { type: string }
          example: Land Cruiser
        - in: query
          name: trim
          schema: { type: string }
          example: VXR
          description: Trim/variant level (e.g. GXR, VXR, SE, Platinum, Sport)
        - in: query
          name: manufacture_year
          schema: { type: integer, minimum: 1990, maximum: 2030 }
          example: 2021
        - in: query
          name: km
          schema: { type: number, minimum: 0 }
          example: 80000
        - in: query
          name: fuel_type
          schema: { type: string, enum: [Petrol, Diesel, Hybrid, Electric] }
        - in: query
          name: gear_type
          schema: { type: string, enum: [Automatic, Manual] }
        - in: query
          name: car_type
          schema: { type: string }
        - in: query
          name: cylinder_count
          schema: { type: integer, minimum: 2, maximum: 16 }
        - in: query
          name: city
          schema: { type: string }
        - in: query
          name: warranty_status
          schema: { type: string }
        - in: query
          name: seller_type
          schema: { type: string, enum: [dealer, private] }
      responses:
        "200":
          description: ML price estimate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MLEstimate"
              example:
                estimated_price_qar: 223827
                confidence_range: [187689, 259966]
                segment: premium
                model_version: "5.0.0"
                r2: 0.6179
                mape: 15.71
