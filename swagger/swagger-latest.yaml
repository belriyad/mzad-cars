components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    guestToken:
      type: apiKey
      in: header
      name: X-Guest-Token
  parameters:
    ProductId:
      in: path
      name: product_id
      required: true
      schema: { type: string }
    UserId:
      in: path
      name: user_id
      required: true
      schema: { type: string }
    RequestUid:
      in: path
      name: request_uid
      required: true
      schema: { type: string }
    BidUid:
      in: path
      name: bid_uid
      required: true
      schema: { type: string }
  schemas:
    AuthTokens:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, example: Bearer }
        expires_in: { type: integer, example: 3600 }
    RegisterRequest:
      type: object
      required: [email, password, full_name]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        full_name: { type: string }
    LoginRequest:
      type: object
      required: [login, password]
      properties:
        login: { type: string, description: email or phone }
        password: { type: string }
    User:
      type: object
      properties:
        id: { type: string }
        role: { type: string, enum: [guest, user, dealer, admin] }
        email: { type: string, format: email }
        phone: { type: string }
        full_name: { type: string }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
    Profile:
      type: object
      properties:
        user_id: { type: string }
        full_name: { type: string }
        avatar_url: { type: string }
        preferred_language: { type: string }
        timezone: { type: string }
        city: { type: string }
    ProfileUpdate:
      type: object
      properties:
        full_name: { type: string }
        avatar_url: { type: string }
        preferred_language: { type: string }
        timezone: { type: string }
        city: { type: string }
    Listing:
      type: object
      properties:
        product_id: { type: string }
        title: { type: string }
        price_qar: { type: number }
        make: { type: string }
        class_name: { type: string }
        model: { type: string }
        manufacture_year: { type: integer }
        km: { type: integer }
        warranty_status: { type: string }
        cylinder_count: { type: integer }
        seller_name: { type: string }
        seller_phone: { type: string }
        seller_type: { type: string }
        seller_whatsapp: { type: string }
        seller_user_id: { type: string }
        is_company: { type: string, description: "'1' for company/dealer account in source payload" }
        city: { type: string }
        url: { type: string }
        description: { type: string }
        main_image_url: { type: string }
        image_urls_json: { type: string, description: JSON array string from feed images }
        all_image_urls_json: { type: string, description: JSON array string from detail endpoint images }
        properties_json: { type: string, description: JSON array string of all listing properties/tags }
        comments_count: { type: integer }
        comments_json: { type: string, description: JSON array string of listing comments }
        expected_price_qar: { type: number }
        discount_qar: { type: number }
        discount_pct: { type: number, description: Deal percentage for this car vs similar peers }
        peer_count: { type: integer }
        mileage_window_km: { type: integer }
        deal_score: { type: number }
        deal_reason: { type: string }
        deal_last_computed_at: { type: string, format: date-time }
        is_approved: { type: boolean, description: True when owner/admin has approved listing for public visibility }
        listing_date: { type: string, format: date }
        view_count: { type: integer, description: Present when include_views=1 or on single-listing endpoint }
        score: { type: integer, description: Present on /spotted rows }
        spot_reasons: { type: string, description: JSON array string; present on /spotted rows }
    ListingCreate:
      type: object
      required: [title, price_qar, make, class_name]
      properties:
        title: { type: string }
        price_qar: { type: number }
        make: { type: string }
        class_name: { type: string }
        model: { type: string }
        manufacture_year: { type: integer }
        km: { type: integer }
        warranty_status: { type: string }
        cylinder_count: { type: integer }
        seller_name: { type: string }
        seller_phone: { type: string }
        seller_type: { type: string }
        seller_whatsapp: { type: string }
        seller_user_id: { type: string }
        is_company: { type: string }
        city: { type: string }
        url: { type: string }
        description: { type: string }
        main_image_url: { type: string }
        image_urls_json: { type: string }
        all_image_urls_json: { type: string }
        properties_json: { type: string }
        comments_count: { type: integer }
        comments_json: { type: string }
    ListingUpdate:
      type: object
      properties:
        title: { type: string }
        price_qar: { type: number }
        make: { type: string }
        class_name: { type: string }
        model: { type: string }
        manufacture_year: { type: integer }
        km: { type: integer }
        warranty_status: { type: string }
        cylinder_count: { type: integer }
        seller_name: { type: string }
        seller_phone: { type: string }
        seller_type: { type: string }
        seller_whatsapp: { type: string }
        seller_user_id: { type: string }
        is_company: { type: string }
        city: { type: string }
        url: { type: string }
        description: { type: string }
        main_image_url: { type: string }
        image_urls_json: { type: string }
        all_image_urls_json: { type: string }
        properties_json: { type: string }
        comments_count: { type: integer }
        comments_json: { type: string }
    ListingsResponse:
      type: object
      properties:
        rows:
          type: array
          items:
            $ref: "#/components/schemas/Listing"
        makes:
          type: array
          items: { type: string }
        classes:
          type: array
          items: { type: string }
        models:
          type: array
          items: { type: string }
        cities:
          type: array
          items: { type: string }
    ListingPeer:
      type: object
      properties:
        product_id: { type: string }
        title: { type: string }
        price_qar: { type: number }
        km: { type: integer }
        manufacture_year: { type: integer }
        main_image_url: { type: string }
        city: { type: string }
        discount_pct: { type: number, nullable: true }
        source: { type: string, enum: [mzad, qatarliving] }
    ListingPeersResponse:
      type: object
      properties:
        product_id: { type: string }
        computed_at: { type: string, format: date-time }
        peer_count: { type: integer }
        expected_price_qar: { type: number, nullable: true }
        mileage_window_km: { type: integer }
        peers:
          type: array
          items:
            $ref: "#/components/schemas/ListingPeer"
    AlertCreate:
      type: object
      required: [user_key]
      properties:
        user_key: { type: string }
        make: { type: string }
        class_name: { type: string }
        model: { type: string }
        city: { type: string }
        search_text: { type: string }
        min_year: { type: integer }
        max_year: { type: integer }
        min_price_qar: { type: integer }
        max_price_qar: { type: integer }
        min_km: { type: integer }
        max_km: { type: integer }
        deals_only: { type: boolean }
        min_discount_pct: { type: number }
        max_discount_pct: { type: number }
        min_peer_count: { type: integer }
        max_peer_count: { type: integer }
    MLEstimate:
      type: object
      properties:
        estimated_price_qar:
          type: number
          description: Point estimate in QAR
        confidence_range:
          type: array
          description: "[low, high] range in QAR based on ±MAE of the segment model"
          items: { type: number }
          minItems: 2
          maxItems: 2
        segment:
          type: string
          enum: [budget, premium]
          description: budget = ≤120k QAR, premium = >120k QAR
        model_version:
          type: string
          description: Trained model version
        r2:
          type: number
          description: R² of the segment model on held-out test data
        mape:
          type: number
          description: Mean absolute percentage error of the segment model (%)
    OfferRequest:
      type: object
      properties:
        id: { type: integer }
        request_uid: { type: string }
        customer_id: { type: string }
        make: { type: string }
        class_name: { type: string }
        model: { type: string, nullable: true }
        year: { type: integer }
        km: { type: integer }
        color: { type: string, nullable: true }
        condition: { type: string, enum: [excellent, good, fair, poor] }
        city: { type: string }
        description: { type: string, nullable: true }
        photo_urls_json: { type: string, nullable: true }
        asking_price_qar: { type: integer, nullable: true }
        contact_name: { type: string, nullable: true }
        contact_phone: { type: string, nullable: true }
        status: { type: string, enum: [open, under_offer, accepted, rejected, expired, cancelled] }
        accepted_bid_id: { type: integer, nullable: true }
        expires_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    OfferRequestCreate:
      type: object
      required: [make, class_name, year, km, condition, city]
      properties:
        make: { type: string }
        class_name: { type: string }
        model: { type: string }
        year: { type: integer }
        km: { type: integer }
        color: { type: string }
        condition: { type: string, enum: [excellent, good, fair, poor] }
        city: { type: string }
        description: { type: string }
        photo_urls_json: { type: string }
        asking_price_qar: { type: integer }
        contact_name: { type: string }
        contact_phone: { type: string }
        expires_at: { type: string, format: date-time }
    OfferBid:
      type: object
      properties:
        id: { type: integer }
        bid_uid: { type: string }
        request_id: { type: integer }
        dealer_id: { type: string }
        amount_qar: { type: integer }
        message: { type: string, nullable: true }
        expires_at: { type: string, format: date-time, nullable: true }
        status: { type: string, enum: [pending, accepted, rejected, withdrawn, expired] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    OfferBidCreate:
      type: object
      required: [amount_qar]
      properties:
        amount_qar: { type: integer }
        message: { type: string }
        expires_at: { type: string, format: date-time }
    OfferComps:
      type: object
      properties:
        count: { type: integer }
        median: { type: number, nullable: true }
        p25: { type: number, nullable: true }
        p75: { type: number, nullable: true }
        min: { type: number, nullable: true }
        max: { type: number, nullable: true }
        avg: { type: number, nullable: true }
        samples:
          type: array
          items:
            type: object
            properties:
              product_id: { type: string }
              title: { type: string }
              price_qar: { type: number }
              km: { type: integer }
              manufacture_year: { type: integer }
              city: { type: string }
              main_image_url: { type: string }
    DealerPreferences:
      type: object
      properties:
        makes:
          type: array
          items: { type: string }
        cities:
          type: array
          items: { type: string }
        min_year: { type: integer }
        max_year: { type: integer }
        max_km: { type: integer }
        notify_push: { type: boolean }
        notify_whatsapp: { type: boolean }
        active: { type: boolean }
